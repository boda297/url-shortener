<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Shorten Your Links</h1>
            <p>Paste a long URL below and get a concise, easy-to-share link.</p>
        </header>

        <main>
            <form id="shorten-form">
                <div class="input-group">
                    <input type="url" id="original-url" placeholder="Enter your long URL here..." required>
                    <button type="submit" id="submit-btn">Shorten</button>
                </div>
            </form>

            <div id="result-container" class="hidden">
                <div class="result-box">
                    <p>Your short link:</p>
                    <div class="short-link-group">
                        <a href="#" id="short-link" target="_blank"></a>
                        <button id="copy-btn" title="Copy to clipboard">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="error-message" class="hidden error"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
